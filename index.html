<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abyssal Tactics: AI Evolution</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #050b14;
      color: #e2e8f0;
    }

    .font-sans {
      font-family: 'Inter', sans-serif;
      /* Fallback for logs */
    }

    .font-pixel {
      font-family: 'Press Start 2P', cursive;
    }

    /* Custom scrollbar for logs */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
      border-left: 1px solid #333;
    }

    ::-webkit-scrollbar-thumb {
      background: #fff;
      border: 2px solid #000;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ccc;
    }

    /* JRPG Box Style */
    .jrpg-box {
      background: linear-gradient(to bottom, #000044, #000022);
      border: 4px solid #fff;
      border-radius: 4px;
      box-shadow: 0 0 0 4px #000000, 0 10px 20px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .jrpg-box::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      bottom: 2px;
      border: 2px solid #8888ff;
      pointer-events: none;
    }

    /* Scanline effect */
    .scanlines {
      background: linear-gradient(to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.1) 50%,
          rgba(0, 0, 0, 0.1));
      background-size: 100% 4px;
      position: fixed;
      pointer-events: none;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      opacity: 0.3;
    }

    /* Screen Shake Animations */
    @keyframes screen-shake-light {

      0%,
      100% {
        transform: translate(0, 0);
      }

      10% {
        transform: translate(-2px, 1px);
      }

      20% {
        transform: translate(2px, -1px);
      }

      30% {
        transform: translate(-1px, 2px);
      }

      40% {
        transform: translate(1px, -2px);
      }

      50% {
        transform: translate(-2px, 1px);
      }

      60% {
        transform: translate(2px, 1px);
      }

      70% {
        transform: translate(-1px, -1px);
      }

      80% {
        transform: translate(1px, 2px);
      }

      90% {
        transform: translate(-1px, -2px);
      }
    }

    @keyframes screen-shake-heavy {

      0%,
      100% {
        transform: translate(0, 0);
      }

      10% {
        transform: translate(-5px, 3px);
      }

      20% {
        transform: translate(5px, -3px);
      }

      30% {
        transform: translate(-4px, 4px);
      }

      40% {
        transform: translate(4px, -4px);
      }

      50% {
        transform: translate(-5px, 2px);
      }

      60% {
        transform: translate(5px, 2px);
      }

      70% {
        transform: translate(-3px, -3px);
      }

      80% {
        transform: translate(3px, 4px);
      }

      90% {
        transform: translate(-2px, -4px);
      }
    }

    .screen-shake-light {
      animation: screen-shake-light 0.3s ease-in-out;
    }

    .screen-shake-heavy {
      animation: screen-shake-heavy 0.5s ease-in-out;
    }

    /* Button Shake (for AP insufficient) */
    @keyframes button-shake {

      0%,
      100% {
        transform: translateX(0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translateX(-4px);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translateX(4px);
      }
    }

    .btn-shake {
      animation: button-shake 0.4s ease-in-out;
    }

    /* Red Flash (for AP insufficient) */
    @keyframes red-flash {

      0%,
      100% {
        box-shadow: none;
      }

      50% {
        box-shadow: 0 0 20px rgba(255, 0, 0, 0.8), inset 0 0 20px rgba(255, 0, 0, 0.3);
      }
    }

    .red-flash {
      animation: red-flash 0.4s ease-in-out;
    }

    /* Floating Text Animations */
    @keyframes float-damage {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(40px) scale(0.8);
      }
    }

    @keyframes float-heal {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-40px) scale(0.8);
      }
    }

    @keyframes float-shield {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.5);
      }

      100% {
        opacity: 0;
        transform: scale(1.8);
      }
    }

    .floating-text {
      position: absolute;
      font-family: 'Press Start 2P', cursive;
      font-size: 18px;
      font-weight: bold;
      pointer-events: none;
      z-index: 1000;
      text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
    }

    .floating-damage {
      animation: float-damage 0.8s ease-out forwards;
      color: #ff3333;
    }

    .floating-heal {
      animation: float-heal 0.8s ease-out forwards;
      color: #33ff33;
    }

    .floating-shield {
      animation: float-shield 0.8s ease-out forwards;
      color: #cccccc;
    }

    /* Boss Breathing Animation */
    @keyframes breathing {

      0%,
      100% {
        transform: scale(1.0);
      }

      50% {
        transform: scale(1.05);
      }
    }

    .animate-breathing {
      animation: breathing 8s ease-in-out infinite;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",

  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <div class="scanlines"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
